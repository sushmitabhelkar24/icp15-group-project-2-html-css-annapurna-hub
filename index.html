<!doctype html>
<html>
  <head>
    <title>Home Page</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/navbar.css" />
    <link rel="stylesheet" href="./css/home.css" />

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600&display=swap" rel="stylesheet">
  </head>

  <body>
    <div class="main-hero-section">

      <!-- Navbar -->
      <div class="main-container">
        <img src="./images/main-logo-icon.png" alt="logo" class="main-logo-icon"/>

        <div class="nav-menu">
          <a href="./index.html" class="menu">Home</a>
          <a href="./pages/about.html" class="menu">About</a>
          <a href="./pages/contact.html" class="menu">Contact</a>
          <a href="./pages/product.html" class="menu">Products</a>
          <a href="./pages/review.html" class="menu">Reviews</a>
        </div>
      </div>

      <!-- Tagline -->
      <div class="tagline-container">
        <p class="tagline">From Our Kitchen to Your Home</p>
      </div>

      <!-- Search Box -->
      <div class="search-container">
        <input type="text" list="options" placeholder="Search products..." class="search-box">

        <datalist id="options">
          <option value="Pickle">
          <option value="Chutneys">
          <option value="Juice Powder">
          <option value="Masala">
          <option value="Papad">
          <option value="Snacks">
        </datalist>
      </div>

     

    </div>
