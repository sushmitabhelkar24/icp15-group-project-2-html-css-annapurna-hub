<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="page-wrapper">
            <div class="container">
                <div class="login-box">
                    <h2 class="hading">Log In To Your Account</h2>
                    <p class="sub-text">
                        Check your order status, update your billing info, and review past purchases.
                    </p>
                    <label>User Name </label>
                    <input type="text"  required>
                    <label>Email </label>
                    <input type="email" required>
                    <label>Password </label>
                    <div class="password-field">
                        <input type="password" required>
                    </div>
                    <a href="./signup.html" class="forgot">Forgot Password</a>
                    <button class="login-btn">LOG IN</button>
                    <p class="signup">Don't have an account? <a href="../pages/singup.html">Sign Up</a></p>
                </div>
                <div class="right-side">
                    <img src="../images/masala-img.jpg" class="right-side img">
                </div>
            </div>
        </div>

</body>
</html>
