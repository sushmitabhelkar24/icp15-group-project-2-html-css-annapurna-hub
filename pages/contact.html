<!doctype html>
<html>
  <head>
    <title>Annapurna Hub</title>
    <link rel="stylesheet" href="./../css/contact.css" />
  </head>
  <body>
    <div>
      <div class="navbar">Contact</div>
  <!-- Hero section -->
      <div class="main-head-section">
        <span class="main-heading-info">Get In Touch</span>
        <p class="main-heading-info-para">
          We are here to hear you! Whether you have a question about services,
          pricing, or anything else, our team is ready to answer all your
          questions.
        </p>
        <div class="facility-section">
          <div class="facility-section-item">
            <img
              src="./../images/contact-page-img/contact-page-shipped.svg"
              alt="order-icon"
              height="22px"
            />
            Place Order
          </div>
          <div class="facility-section-item">
            <img
              src="./../images/contact-page-img/contact-page-message.svg"
              alt="message-icon"
              height="18px"
            />Send message
          </div>
          <div class="facility-section-item">
            <img
              src="./../images/contact-page-img/contact-page-location.svg"
              alt="location-icon"
              height="18px"
            />Our Location
          </div>
        </div>
      </div>
